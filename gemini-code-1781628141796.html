<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение для Катерины</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fdf2f8;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: all 0.4s ease;
        }

        .page {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .page.active {
            display: block;
            opacity: 1;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #ff6b81;
        }

        .illustration {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            font-family: 'Nunito', sans-serif;
            font-size: 18px;
            font-weight: 700;
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        #btnYes, .submit-btn {
            background-color: #ff6b81;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
        }

        #btnYes:hover:not(:disabled), .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 129, 0.6);
        }

        #btnNo {
            background-color: #f1f2f6;
            color: #747d8c;
            z-index: 100;
        }

        .counter-container {
            margin-top: 25px;
            font-size: 16px;
            color: #a4b0be;
            opacity: 0;
            transition: opacity 0.4s ease;
            font-weight: 700;
        }

        .counter-container.visible {
            opacity: 1;
        }

        #counterValue {
            color: #ff6b81;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label.question {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 18px;
            color: #2f3542;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .options label {
            display: flex;
            align-items: center;
            background: #f1f2f6;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .options label:hover {
            background: #dfe4ea;
        }

        input[type="radio"], input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
            accent-color: #ff6b81;
        }

        /* Стили для календаря */
        .date-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid #f1f2f6;
            background-color: #f1f2f6;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            color: #4a4a4a;
            outline: none;
            transition: border-color 0.3s, background-color 0.3s;
            cursor: pointer;
        }

        .date-input:focus {
            border-color: #ff6b81;
            background-color: #ffffff;
        }

        .submit-btn {
            width: 100%;
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <!-- СТРАНИЦА 1 -->
    <div id="page1" class="container page active">
        <div class="illustration">💌</div>
        <h1>Катерина, позвольте мне скрасить ваш вечер? ✨</h1>
        <div class="buttons">
            <button id="btnYes" onclick="goToPage2()">Да!</button>
            <button id="btnNo">Нет</button>
        </div>
        <div id="counterContainer" class="counter-container">
            Попыток отказаться: <span id="counterValue">0</span> 😢
        </div>
    </div>

    <!-- СТРАНИЦА 2 -->
    <div id="page2" class="container page">
        <div class="illustration">🎉</div>
        <h1>Ура! Выбери, что тебе по душе:</h1>
        
        <form id="dateForm" onsubmit="finish(event)">
            <div class="form-group">
                <label class="question">Что будем пить?</label>
                <div class="options">
                    <label><input type="radio" name="Напиток" value="Кофе" required> Кофе (может, кортадо? ☕)</label>
                    <label><input type="radio" name="Напиток" value="Чай"> Вкусный чай 🫖</label>
                    <label><input type="radio" name="Напиток" value="Вино"> Вино 🍷</label>
                </div>
            </div>

            <div class="form-group">
                <label class="question">Куда пойдем? (можно выбрать несколько)</label>
                <div class="options">
                    <label><input type="checkbox" name="Место" value="Гулять"> Гулять по городу 🌆</label>
                    <label><input type="checkbox" name="Место" value="Кино"> В кино 🍿</label>
                    <label><input type="checkbox" name="Место" value="Ужин"> На вкусный ужин 🍝</label>
                    <label><input type="checkbox" name="Место" value="Роллердром"> На роллердром 🛼</label>
                </div>
            </div>

            <!-- Блок с выбором даты -->
            <div class="form-group">
                <label class="question">В какой день тебе удобнее?</label>
                <input type="date" name="Дата" class="date-input" required>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">Отправить ответ 🚀</button>
        </form>
    </div>

    <!-- СТРАНИЦА 3 -->
    <div id="page3" class="container page">
        <div class="illustration">🥰</div>
        <h1>Договорились!</h1>
        <p>Я все записал. Жду нашей встречи!</p>
    </div>

    <script>
        // Установка минимальной даты в календаре (чтобы нельзя было выбрать прошедшие дни)
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.querySelector('.date-input');
            const today = new Date().toISOString().split('T')[0];
            dateInput.setAttribute('min', today);
        });

        // --- ЛОГИКА УБЕГАЮЩЕЙ КНОПКИ ---
        const btnNo = document.getElementById('btnNo');
        const counterContainer = document.getElementById('counterContainer');
        const counterValue = document.getElementById('counterValue');
        let attempts = 0;

        const moveButton = (e) => {
            if (e.type === 'touchstart') e.preventDefault();
            
            attempts++;
            counterValue.textContent = attempts;
            if (attempts === 1) counterContainer.classList.add('visible');

            const maxX = window.innerWidth - btnNo.offsetWidth;
            const maxY = window.innerHeight - btnNo.offsetHeight;

            const randomX = Math.floor(Math.random() * (maxX - 20) + 10);
            const randomY = Math.floor(Math.random() * (maxY - 20) + 10);

            btnNo.style.position = 'fixed';
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
            btnNo.style.transition = 'left 0.2s ease, top 0.2s ease';
        };

        btnNo.addEventListener('mouseover', moveButton);
        btnNo.addEventListener('touchstart', moveButton);

        function goToPage2() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            document.body.style.overflow = 'auto';
        }

        // --- ЛОГИКА ОТПРАВКИ ФОРМЫ НА EMAIL ---
        async function finish(event) {
            event.preventDefault(); 
            
            const form = event.target;
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            
            // Твоя ссылка интегрирована здесь:
            const URL = "https://formspree.io/f/xeewdlzb"; 

            // Меняем вид кнопки во время отправки
            submitBtn.innerHTML = "Отправляем... ⏳";
            submitBtn.disabled = true;

            const formData = new FormData(form);

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    // Если успешно - показываем третью страницу
                    document.getElementById('page2').classList.remove('active');
                    document.getElementById('page3').classList.add('active');
                } else {
                    alert("Ой, что-то пошло не так. Попробуй еще раз!");
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                alert("Ошибка сети. Проверь подключение к интернету!");
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
